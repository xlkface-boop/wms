<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Inteligente - Inventário Cego</title>
    <!-- Biblioteca de Alertas Bonitos (SweetAlert2) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container { width: 100%; max-width: 500px; margin-top: 10px; margin-bottom: 30px; }

        .trava-alerta {
            background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5;
            padding: 12px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; margin-bottom: 20px;
        }

        .inventario-container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); padding: 25px; border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); position: relative;
        }

        .progresso-box {
            position: absolute; top: 25px; right: 25px; background: rgba(255,255,255,0.1);
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: #ffd700;
        }

        /* 🆕 CABEÇALHO DA CONTAGEM: SEM O "X", MAS CENTRALIZADO NO MEIO */
        .header-contagem-box {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .header-contagem-box h3 {
            color: #ffffff; font-size: 20px; font-weight: 700;
        }

        .item-focado {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ea580c;
        }

        .nm-label { font-size: 12px; color: #a0aec0; text-transform: uppercase; font-weight: bold; }
        .nm-titulo { color: #ffd700; font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .desc-material { color: #ffffff; font-size: 16px; line-height: 1.5; margin-bottom: 20px; }

        .loc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .loc-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 6px; }
        .loc-titulo { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .loc-valor { font-size: 14px; color: #60a5fa; font-weight: bold; margin-top: 2px; }

        .label-input { display: block; font-size: 13px; color: #cbd5e0; margin-bottom: 8px; font-weight: 600; }
        .input-qtd {
            width: 100%; padding: 16px; background: #ffffff; border: 2px solid transparent; border-radius: 8px;
            font-size: 20px; font-weight: bold; outline: none; color: #1a202c; text-align: center; margin-bottom: 20px;
        }
        .input-qtd:focus { border-color: #ea580c; box-shadow: 0 0 15px rgba(234, 88, 12, 0.3); }

        .btn-proximo {
            width: 100%; padding: 16px; background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
        }

        .direitos-box { max-width: 500px; text-align: center; padding: 15px; background: rgba(0, 0, 0, 0.6); border-radius: 8px; width: 100%; margin-top: auto; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="trava-alerta">🔒 MODO DE AUDITORIA ATIVO - CONTAGEM CEGA</div>

        <div class="inventario-container">
            <div class="progresso-box" id="qtdProgresso">1 / 2</div>

            <!-- Cabeçalho Centralizado Sem Botão de Sair -->
            <div class="header-contagem-box">
                <h3>Ajuste de Estoque</h3>
            </div>

            <form id="formFilaInventario" onsubmit="proximoItem(event)">
                <div class="item-focado">
                    <span class="nm-label">Número de Material (NM)</span>
                    <div class="nm-titulo" id="lblNM">1000142</div>
                    <div class="desc-material" id="lblDescricao">VALVULA GLOBO FLUÍDOS 3 POL SCH40</div>
                    
                    <div class="loc-grid">
                        <div class="loc-box">
                            <span class="loc-titulo">🏢 Depósito</span>
                            <div class="loc-valor" id="lblDeposito">DP01</div>
                        </div>
                        <div class="loc-box">
                            <span class="loc-titulo">📍 Endereço</span>
                            <div class="loc-valor" id="lblEndereco">P-04-A-02</div>
                        </div>
                    </div>
                </div>

                <label class="label-input">Quantidade Física Encontrada no Local:</label>
                <input type="number" id="txtQtd" class="input-qtd" placeholder="0" required min="0" inputmode="numeric" autofocus>

                <button type="submit" class="btn-proximo">💾 Confirmar e Avançar ➔</button>
            </form>
        </div>
    </div>

    <div class="direitos-box">
        <p style="font-size: 11px; color: #cbd5e0;">&copy; 2026 WMS Inteligente. Propriedade de <strong>Dário João Torres</strong>.</p>
    </div>

    <script>
        const filaMateriais = [
            { nm: "1000142", desc: "VALVULA GLOBO FLUÍDOS 3 POL SCH40", deposito: "DP01", endereco: "P-04-A-02" },
            { nm: "2000551", desc: "MANOMETRO PRESSAO FLANGEADO 1/2 NPT", deposito: "DP03", endereco: "P-01-C-05" }
        ];
        let indiceAtual = 0;

        history.pushState(null, null, location.href);
        window.onpopstate = function () { 
            history.go(1); 
            // Alerta moderno ao tentar voltar a página no navegador
            Swal.fire({
                icon: 'lock',
                title: 'Ação Bloqueada!',
                text: 'O inventário é obrigatório e precisa ser concluído.',
                confirmButtonColor: '#ea580c', // Laranja que combina com o fluxo de contagem
                confirmButtonText: 'Continuar Contagem'
            });
        };

        function carregarItem() {
            const item = filaMateriais[indiceAtual];
            document.getElementById("lblNM").innerText = item.nm;
            document.getElementById("lblDescricao").innerText = item.desc;
            document.getElementById("lblDeposito").innerText = item.deposito;
            document.getElementById("lblEndereco").innerText = item.endereco;
            document.getElementById("qtdProgresso").innerText = `${indiceAtual + 1} / ${filaMateriais.length}`;
            document.getElementById("txtQtd").value = "";
            document.getElementById("txtQtd").focus();
        }

        function proximoItem(e) {
            e.preventDefault();
            indiceAtual++;
            if (indiceAtual < filaMateriais.length) { 
                carregarItem(); 
            } else { 
                // Alerta moderno de finalização de inventário
                Swal.fire({
                    icon: 'success',
                    title: 'Inventário Concluído!',
                    text: 'Todas as contagens foram registradas com sucesso.',
                    confirmButtonColor: '#16a34a', // Verde sucesso do botão confirmar
                    confirmButtonText: 'Voltar ao Menu'
                }).then(() => {
                    window.location.href = "menu.html";
                });
            }
        }

        // ⏱️ TRAVA CORPORATIVA DE INATIVIDADE (SEGURANÇA EXTREMA)
        let cronometroInatividade;

        function resetarCronometroSessao() {
            clearTimeout(cronometroInatividade);
            // 5 minutos convertidos para milissegundos
            cronometroInatividade = setTimeout(executarBloqueioPorInatividade, 300000); 
        }

        function executarBloqueioPorInatividade() {
            // Apaga as permissões locais instantaneamente
            localStorage.clear();
            
            Swal.fire({
                icon: 'warning',
                title: 'Sessão Expirada!',
                text: 'Por diretrizes de segurança, o sistema foi bloqueado devido a 5 minutos de inatividade.',
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Efetuar Login Novamente',
                allowOutsideClick: false
            }).then(() => {
                window.location.href = "index.html"; // Chuta o usuário para fora
            });
        }

        // Configura inicialização combinada e os listeners de movimentação
        window.onload = function() {
            carregarItem();
            resetarCronometroSessao();
        };
        document.onmousemove = resetarCronometroSessao;
        document.onkeypress = resetarCronometroSessao;
        document.onclick = resetarCronometroSessao;
        document.onscroll = resetarCronometroSessao;
        document.ontouchstart = resetarCronometroSessao;
    </script>
</body>
</html>
