<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Inteligente - Acesso Seguro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            /* Imagem de fundo otimizada (URL externa para evitar lentidão do Base64 no mobile) */
            background: linear-gradient(rgba(11, 16, 29, 0.85), rgba(11, 16, 29, 0.85)), 
                        url('https://i.imgur.com/K5f4gB1.jpeg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0b101d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 35px 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 2;
        }

        .login-card h2 { font-size: 26px; margin-bottom: 20px; color: #10b981; }

        .form-group { margin-bottom: 18px; text-align: left; }
        label { font-size: 13px; color: #9ca3af; display: block; margin-bottom: 5px; }
        input {
            width: 100%; background: #374151; border: 1px solid #4b5563;
            padding: 12px; border-radius: 8px; color: white; outline: none;
        }
        input:focus { border-color: #10b981; }

        .btn-primary {
            width: 100%; background: #10b981; color: white; border: none;
            padding: 13px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }

        .info-seguranca {
            margin-top: 20px; font-size: 10px; color: #4b5563; line-height: 1.4;
        }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #1f2937; padding: 25px; border-radius: 12px; max-width: 320px; text-align: center;
        }
        .modal-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-card" id="cardLogin">
        <h2>Acessar WMS</h2>
        <form onsubmit="validarAcesso(event)">
            <div class="form-group">
                <label>E-mail Corporativo:</label>
                <input type="email" id="email" placeholder="joao-torres33@live.com" required>
            </div>
            <div class="form-group">
                <label>Senha do Sistema:</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Entrar com Segurança</button>
        </form>
        
        <div class="info-seguranca">
            🔒 Seu acesso está sendo monitorado.<br>
            IP: <span id="userIP">Carregando...</span><br>
            Dispositivo: <span id="userDevice">Detectando...</span>
        </div>
    </div>

    <div id="customAlert" class="modal">
        <div class="modal-content">
            <div id="alertMsg" style="color: white; font-size: 14px; white-space: pre-line;"></div>
            <button class="modal-btn" onclick="fecharAlerta()">OK</button>
        </div>
    </div>

    <script>
        // Configurações de Segurança
        const ADM_EMAIL = "joao-torres33@live.com";
        let dadosSeguranca = { ip: "", device: "", geo: "" };

        // 1. Capturar Dados do Dispositivo e IP
        async function capturarSeguranca() {
            // Detectar Dispositivo
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) dadosSeguranca.device = "Android Device";
            else if (/iPhone|iPad/i.test(ua)) dadosSeguranca.device = "iOS Device";
            else dadosSeguranca.device = "Desktop/PC";
            document.getElementById('userDevice').innerText = dadosSeguranca.device;

            // Detectar IP (usando API pública gratuita)
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                dadosSeguranca.ip = data.ip;
                document.getElementById('userIP').innerText = data.ip;
            } catch (e) {
                dadosSeguranca.ip = "Não detectado";
            }

            // Detectar Localização
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    dadosSeguranca.geo = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                });
            }
        }

        function exibirAlerta(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function fecharAlerta() {
            document.getElementById('customAlert').style.display = 'none';
        }

        async function validarAcesso(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;

            // Log de Segurança (Simulado para o Firebase)
            console.log("Tentativa de Acesso:", {
                usuario: email,
                ip: dadosSeguranca.ip,
                dispositivo: dadosSeguranca.device,
                local: dadosSeguranca.geo,
                data: new Date().toLocaleString()
            });

            // Regra de Domínio
            if (email !== ADM_EMAIL && !email.endsWith("@transpetro.com.br")) {
                exibirAlerta("❌ ACESSO NEGADO!\n\nEste dispositivo e e-mail não possuem autorização para este sistema.");
                return;
            }

            // Validação (Aqui entra o Firebase no próximo passo)
            if (email === ADM_EMAIL && senha === "admin123") {
                exibirAlerta(`🔓 Bem-vindo, Administrador!\n\nIP: ${dadosSeguranca.ip}\nDispositivo: ${dadosSeguranca.device}\nAcesso registrado com sucesso.`);
                setTimeout(() => { window.location.replace('menu.html'); }, 2000);
            } else {
                exibirAlerta("✅ Login efetuado!\nVerificando credenciais no banco de dados...");
            }
        }

        window.onload = capturarSeguranca;
    </script>
</body>
</html>
