            background-size: cover;
            background-color: #0b101d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 16, 29, 0.85);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 35px 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 500;
        }

        input {
            background: #374151;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #10b981;
        }

        .btn-primary {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #059669;
        }

        .btn-secondary {
            background: transparent;
            color: #9ca3af;
            border: none;
            margin-top: 15px;
