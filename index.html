<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Inteligente - Acesso</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
            --input-bg: #f9fafb;
            --input-border: #d1d5db;
            --primary-color: #10b981;
            --footer-text: #6b7280;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b101d;
                --card-bg: #111827;
                --text-color: #ffffff;
                --input-bg: #374151;
                --input-border: #4b5563;
                --footer-text: #9ca3af;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; transition: background 0.3s, color 0.3s; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--card-bg);
            border: 1px solid var(--input-border);
            padding: 35px 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-card h2 { font-size: 26px; margin-bottom: 25px; color: var(--primary-color); }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 13px; color: var(--footer-text); display: block; margin-bottom: 6px; }
        input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--input-border);
            padding: 12px; border-radius: 8px; color: var(--text-color); outline: none;
        }
        input:focus { border-color: var(--primary-color); }

        .btn-acao {
            width: 100%; background: var(--primary-color); color: white; border: none;
            padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-toggle {
            background: transparent; color: var(--footer-text); border: none;
            font-size: 13px; cursor: pointer; text-decoration: underline;
        }

        .rodape-login {
            margin-top: 30px;
            font-size: 11px;
            color: var(--footer-text);
            text-align: center;
            max-width: 380px;
            line-height: 1.5;
        }

        .aviso-restrito {
            color: #f87171;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg); padding: 25px; border-radius: 12px; max-width: 320px; text-align: center; border: 1px solid var(--input-border);
        }
        .modal-btn { background: var(--primary-color); color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; margin-top: 15px; font-weight: 600; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 id="tituloTela">Acessar WMS</h2>
        
        <!-- Formulário Único para Login e Cadastro -->
        <form id="authForm">
            <div class="form-group">
                <label>E-mail Corporativo:</label>
                <input type="email" id="email" placeholder="exemplo@transpetro.com.br" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Senha do Sistema:</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-acao" id="btnPrincipal">Entrar no Sistema</button>
            <button type="button" class="btn-toggle" id="btnToggle" onclick="alternarModo()">Não tem conta? Criar Acesso</button>
        </form>
    </div>

    <div class="rodape-login">
        &copy; 2026 WMS Inteligente. Todos os direitos reservados.<br>
        Projeto independente desenvolvido e de propriedade exclusiva de<br>
        <strong>Dário João Torres</strong>.<br>
        <span class="aviso-restrito">⚠️ AVISO DE USO RESTRITO: Uso autorizado apenas para e-mails institucionais da Transpetro.</span>
    </div>

    <div id="customAlert" class="modal">
        <div class="modal-content">
            <div id="alertMsg" style="font-size: 14px; white-space: pre-line;"></div>
            <button class="modal-btn" onclick="fecharAlerta()">OK</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCI5iG3O0IRdrOiFR50WsCi1L0Werlfcnw",
            authDomain: "bolao-copa-2026-d264f.firebaseapp.com",
            projectId: "bolao-copa-2026-d264f",
            storageBucket: "bolao-copa-2026-d264f.firebasestorage.app",
            messagingSenderId: "802924891915",
            appId: "1:802924891915:web:d9c641161733b510559c0e",
            measurementId: "G-QQ210F367M"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const ADM_EMAIL = "joao-torres33@live.com";
        let modoLogin = true;

        function exibirAlerta(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function fecharAlerta() {
            document.getElementById('customAlert').style.display = 'none';
        }

        function alternarModo() {
            modoLogin = !modoLogin;
            document.getElementById('tituloTela').innerText = modoLogin ? "Acessar WMS" : "Criar Acesso";
            document.getElementById('btnPrincipal').innerText = modoLogin ? "Entrar no Sistema" : "Cadastrar Agora";
            document.getElementById('btnToggle').innerText = modoLogin ? "Não tem conta? Criar Acesso" : "Já tenho conta. Entrar";
        }

        async function obterDadosSeguranca() {
            let ip = "Desconhecido";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch (e) {}
            return {
                ip: ip,
                dispositivo: navigator.userAgent,
                dataAcesso: new Date().toLocaleString('pt-BR'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btnPrincipal');

            btn.disabled = true;
            btn.innerText = "Processando...";

            // Trava de Domínio
            if (email !== ADM_EMAIL && !email.endsWith("@transpetro.com.br")) {
                exibirAlerta("❌ ACESSO NEGADO!\n\nUtilize seu e-mail institucional @transpetro.com.br.");
                btn.disabled = false;
                btn.innerText = modoLogin ? "Entrar no Sistema" : "Cadastrar Agora";
                return;
            }

            const dadosSeg = await obterDadosSeguranca();

            try {
                if (modoLogin) {
                    // LOGIN
                    const userCredential = await auth.signInWithEmailAndPassword(email, senha);
                    
                    // Busca perfil no Firestore
                    let perfilUsuario = "OPERACIONAL";
                    if (email === ADM_EMAIL) {
                        perfilUsuario = "ADMIN";
                    } else {
                        const userDoc = await db.collection("usuarios").doc(email).get();
                        if (userDoc.exists && (userDoc.data().perfil === "GERENCIAL" || userDoc.data().perfil === "ADMIN")) {
                            perfilUsuario = "ADMIN";
                        }
                    }

                    // 🔑 GRAVA SESSÃO NO LOCALSTORAGE
                    localStorage.setItem('wms_usuario', email);
                    localStorage.setItem('wms_perfil', perfilUsuario);

                    await db.collection("logs_acesso").add({ usuario: email, status: "LOGIN_SUCESSO", ...dadosSeg });
                    exibirAlerta(`🔓 Bem-vindo!\nAcesso liberado.`);
                    
                    setTimeout(() => { 
                        window.location.replace('menu.html'); 
                    }, 1000);

                } else {
                    // CADASTRO
                    await auth.createUserWithEmailAndPassword(email, senha);
                    const perfilDefinido = (email === ADM_EMAIL ? "GERENCIAL" : "OPERACIONAL");
                    
                    await db.collection("usuarios").doc(email).set({
                        email: email,
                        perfil: perfilDefinido,
                        dataCadastro: new Date().toISOString()
                    });

                    await db.collection("logs_acesso").add({ usuario: email, status: "CADASTRO_SUCESSO", ...dadosSeg });
                    exibirAlerta("✅ Cadastro realizado!\nAgora você já pode entrar.");
                    alternarModo();
                }
            } catch (error) {
                let msgErro = "Ocorreu um erro. Verifique seus dados.";
                if (error.code === "auth/email-already-in-use") msgErro = "Este e-mail já está em uso.";
                if (error.code === "auth/wrong-password") msgErro = "Senha incorreta.";
                if (error.code === "auth/user-not-found") msgErro = "Usuário não encontrado.";
                
                await db.collection("logs_acesso").add({ usuario: email, status: "ERRO", erro: error.code, ...dadosSeg });
                exibirAlerta("❌ " + msgErro);
            }

            btn.disabled = false;
            btn.innerText = modoLogin ? "Entrar no Sistema" : "Cadastrar Agora";
        });

        // Garante que os campos comecem limpos
        window.onload = () => {
            document.getElementById('email').value = "";
            document.getElementById('senha').value = "";
        };
    </script>
</body>
</html>
