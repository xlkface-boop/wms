<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar WMS - Transpetro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            /* 🖼️ Imagem de fundo corrigida para funcionar como plano de fundo do sistema */
            background: url('https://i.imgur.com/K5f4gB1.jpeg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0b101d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Overlay para garantir legibilidade sobre a imagem */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 16, 29, 0.75);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 35px 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 500;
        }

        input {
            background: #374151;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #10b981;
        }

        .btn-acessar {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-acessar:hover {
            background: #059669;
        }

        .rodape-login {
            position: relative;
            z-index: 2;
            margin-top: 30px;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
            max-width: 380px;
            line-height: 1.5;
        }

        .rodape-login strong {
            color: #9ca3af;
        }

        .aviso-restrito {
            color: #f87171;
            font-weight: bold;
            display: block;
            margin-top: 4px;
        }

        /* 🔔 Estilização do Alerta Padronizado (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f2937;
            padding: 25px;
            border-radius: 12px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            border: 1px solid #374151;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .modal-text {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acessar WMS</h2>

        <form id="formLogin" onsubmit="validarLogin(event)">
            <div class="form-group">
                <label for="txtEmail">E-mail Corporativo:</label>
                <input type="email" id="txtEmail" placeholder="seu.nome@transpetro.com.br" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="txtSenha">Senha do Sistema:</label>
                <input type="password" id="txtSenha" placeholder="Digite sua senha..." required>
            </div>

            <button type="submit" class="btn-acessar">Acessar Painel</button>
        </form>
    </div>

    <div class="rodape-login">
        &copy; 2026 WMS Inteligente. Todos os direitos reservados.<br>
        Projeto independente desenvolvido e de propriedade exclusiva de<br>
        <strong>Dário João Torres</strong>.<br>
        <span class="aviso-restrito">⚠️ AVISO DE USO RESTRITO: Uso autorizado apenas para e-mails institucionais da Transpetro.</span>
    </div>

    <!-- Estrutura do Modal Padronizado -->
    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <div id="alertMsg" class="modal-text"></div>
            <button class="modal-btn" onclick="fecharAlerta()">OK</button>
        </div>
    </div>

    <script>
        // 🔒 LIMPEZA RIGOROSA DE SESSÃO AO NAVEGAR OU VOLTAR NO NAVEGADOR
        function resetarSessao() {
            localStorage.removeItem('wms_sessao_ativa');
            localStorage.removeItem('wms_usuario_ativo');
            localStorage.removeItem('wms_chave_ativa');
            localStorage.removeItem('wms_perfil');
            localStorage.removeItem('wms_email');
        }

        window.addEventListener('load', resetarSessao);
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                resetarSessao();
            }
        });

        // Função para exibir o alerta padronizado (substituindo o alert nativo)
        let proximoPasso = null;
        function exibirAlerta(mensagem, callback = null) {
            document.getElementById('alertMsg').innerText = mensagem;
            document.getElementById('customAlert').style.display = 'flex';
            proximoPasso = callback;
        }

        function fecharAlerta() {
            document.getElementById('customAlert').style.display = 'none';
            if (proximoPasso) proximoPasso();
        }

        function validarLogin(e) {
            e.preventDefault();

            const email = document.getElementById('txtEmail').value.trim().toLowerCase();
            const senha = document.getElementById('txtSenha').value;

            // 1. VALIDAÇÃO DE DOMÍNIO E E-MAIL ADMINISTRATIVO
            const emailAdmin = "joao.torres33@live.com";
            
            if (email !== emailAdmin && !email.endsWith('@transpetro.com.br')) {
                exibirAlerta('⚠️ Acesso Negado!\n\nEste sistema é exclusivo para colaboradores Transpetro ou Administração. Utilize seu e-mail institucional.');
                return;
            }

            // 2. DEFINIÇÃO DE PERFIL
            let perfil = "OPERACIONAL";
            if (email === emailAdmin) {
                perfil = "GERENCIAL";
            }

            // 3. BLOQUEIO DE DOMINGO PARA OPERACIONAL
            const diaSemana = new Date().getDay(); // 0 = Domingo
            if (diaSemana === 0 && perfil === 'OPERACIONAL') {
                exibirAlerta('⛔ Operação Indisponível!\n\nAcessos operacionais estão suspensos aos domingos para manutenção de banco de dados.');
                return;
            }

            // 4. MENSAGEM PADRÃO DE ALERT PADRONIZADA
            if (perfil === "GERENCIAL") {
                exibirAlerta('🔓 Bem-vindo, Dário! Acesso de Administrador liberado.', () => {
                    localStorage.setItem('wms_usuario_ativo', 'Dário João Torres');
                    localStorage.setItem('wms_chave_ativa', 'GERENTE-01');
                    finalizarLogin(perfil, email);
                });
            } else {
                exibirAlerta('✅ Login efetuado com sucesso!', () => {
                    localStorage.setItem('wms_usuario_ativo', email.split('@')[0]);
                    localStorage.setItem('wms_chave_ativa', 'OPERADOR-01');
                    finalizarLogin(perfil, email);
                });
            }
        }

        function finalizarLogin(perfil, email) {
            localStorage.setItem('wms_perfil', perfil);
            localStorage.setItem('wms_email', email);
            localStorage.setItem('wms_sessao_ativa', 'true');
            window.location.replace('menu.html');
        }
    </script>
</body>
</html>
