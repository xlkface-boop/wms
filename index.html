<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acessar WMS - Transpetro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body {
            /* 🖼️ Imagem de fundo corrigida */
            background: url('https://i.imgur.com/K5f4gB1.jpeg') no-repeat center center fixed;
            background-size: cover;
            background-color: #0b101d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 16, 29, 0.85);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            background: #111827;
            border: 1px solid #1f2937;
            padding: 35px 25px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 13px;
            color: #9ca3af;
            font-weight: 500;
        }

        input {
            background: #374151;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #10b981;
        }

        .btn-primary {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #059669;
        }

        .btn-secondary {
            background: transparent;
            color: #9ca3af;
            border: none;
            margin-top: 15px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
        }

        .rodape-login {
            position: relative;
            z-index: 2;
            margin-top: 30px;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
            max-width: 380px;
            line-height: 1.5;
        }

        .aviso-restrito {
            color: #f87171;
            font-weight: bold;
            display: block;
            margin-top: 4px;
        }

        /* 🔔 Modal Padronizado */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1f2937;
            padding: 25px;
            border-radius: 12px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            border: 1px solid #374151;
        }

        .modal-text {
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        .modal-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- CARD DE LOGIN -->
    <div class="login-card" id="cardLogin">
        <h2>Acessar WMS</h2>
        <form onsubmit="validarLogin(event)">
            <div class="form-group">
                <label>E-mail Corporativo:</label>
                <input type="email" id="loginEmail" placeholder="seu.nome@transpetro.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha do Sistema:</label>
                <input type="password" id="loginSenha" placeholder="Digite sua senha..." required>
            </div>
            <button type="submit" class="btn-primary">Acessar Painel</button>
            <button type="button" class="btn-secondary" onclick="alternarTelas()">Não tem conta? Criar Acesso</button>
        </form>
    </div>

    <!-- CARD DE CADASTRO -->
    <div class="login-card hidden" id="cardCadastro">
        <h2>Criar Acesso</h2>
        <form onsubmit="registrarUsuario(event)">
            <div class="form-group">
                <label>E-mail Corporativo:</label>
                <input type="email" id="regEmail" placeholder="seu.nome@transpetro.com.br" required>
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" id="regSenha" placeholder="Crie uma senha..." required>
            </div>
            <button type="submit" class="btn-primary">Cadastrar</button>
            <button type="button" class="btn-secondary" onclick="alternarTelas()">Já tenho conta. Entrar</button>
        </form>
    </div>

    <div class="rodape-login">
        &copy; 2026 WMS Inteligente. Todos os direitos reservados.<br>
        Projeto independente desenvolvido e de propriedade exclusiva de<br>
        <strong>Dário João Torres</strong>.<br>
        <span class="aviso-restrito">⚠️ AVISO DE USO RESTRITO: Uso autorizado apenas para e-mails institucionais da Transpetro.</span>
    </div>

    <!-- Alerta Padronizado -->
    <div id="customAlert" class="modal-overlay">
        <div class="modal-content">
            <div id="alertMsg" class="modal-text"></div>
            <button class="modal-btn" onclick="fecharAlerta()">OK</button>
        </div>
    </div>

    <script>
        const EMAIL_ADMIN = "joao.torres33@live.com";
        const SENHA_ADMIN_PADRAO = "admin123"; // Senha inicial do ADM

        // Inicializa o banco de dados local se não existir
        if (!localStorage.getItem('wms_usuarios')) {
            const usuariosIniciais = {};
            usuariosIniciais[EMAIL_ADMIN] = { senha: SENHA_ADMIN_PADRAO, perfil: "GERENCIAL", nome: "Dário João Torres" };
            localStorage.setItem('wms_usuarios', JSON.stringify(usuariosIniciais));
        }

        function alternarTelas() {
            document.getElementById('cardLogin').classList.toggle('hidden');
            document.getElementById('cardCadastro').classList.toggle('hidden');
        }

        let proximoPasso = null;
        function exibirAlerta(msg, callback = null) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'flex';
            proximoPasso = callback;
        }

        function fecharAlerta() {
            document.getElementById('customAlert').style.display = 'none';
            if (proximoPasso) proximoPasso();
        }

        function registrarUsuario(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const senha = document.getElementById('regSenha').value;
            const usuarios = JSON.parse(localStorage.getItem('wms_usuarios'));

            if (!email.endsWith('@transpetro.com.br') && email !== EMAIL_ADMIN) {
                exibirAlerta('⚠️ Erro!\nUtilize um e-mail @transpetro.com.br');
                return;
            }

            if (usuarios[email]) {
                exibirAlerta('⚠️ Este e-mail já está cadastrado.');
                return;
            }

            usuarios[email] = { 
                senha: senha, 
                perfil: "OPERACIONAL", 
                nome: email.split('@')[0] 
            };
            
            localStorage.setItem('wms_usuarios', JSON.stringify(usuarios));
            exibirAlerta('✅ Cadastro realizado com sucesso!', () => alternarTelas());
        }

        function validarLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const senha = document.getElementById('loginSenha').value;
            const usuarios = JSON.parse(localStorage.getItem('wms_usuarios'));

            const usuario = usuarios[email];

            if (!usuario || usuario.senha !== senha) {
                exibirAlerta('❌ Acesso Negado!\nE-mail ou senha incorretos.');
                return;
            }

            // Bloqueio de Domingo para Operacional
            const diaSemana = new Date().getDay();
            if (diaSemana === 0 && usuario.perfil === 'OPERACIONAL') {
                exibirAlerta('⛔ Operação Indisponível!\nAcessos operacionais suspensos aos domingos.');
                return;
            }

            const saudacao = usuario.perfil === "GERENCIAL" 
                ? `🔓 Bem-vindo, ${usuario.nome}!\nAcesso de Administrador liberado.` 
                : `✅ Login efetuado com sucesso!\nBem-vindo, ${usuario.nome}.`;

            exibirAlerta(saudacao, () => {
                localStorage.setItem('wms_sessao_ativa', 'true');
                localStorage.setItem('wms_usuario_ativo', usuario.nome);
                localStorage.setItem('wms_perfil', usuario.perfil);
                localStorage.setItem('wms_email', email);
                window.location.replace('menu.html');
            });
        }

        // Limpeza de sessão ao carregar
        window.onload = () => {
            localStorage.removeItem('wms_sessao_ativa');
        };
    </script>
</body>
</html>
