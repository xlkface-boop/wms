<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Inteligente - Autenticação</title>
    <!-- Biblioteca de Alertas Bonitos (SweetAlert2) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            /* 🖼️ SUA FOTO DA PETROBRAS HOSPEDADA EM ALTA VELOCIDADE */
            background: url('https://i.imgur.com/K5f4gB1.jpeg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Máscara escura suave para garantir contraste e esconder imperfeições nas bordas */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 1;
        }

        /* Card de Login Profissional Translúcido */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.8); /* Escurecido para dar foco absoluto no formulário */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .login-header h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 13px;
            color: #cbd5e1;
            font-weight: 600;
        }

        select, input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            width: 100%;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: #22c55e; /* Destaque Verde Petrobras */
            outline: none;
        }

        select option {
            background: #1e293b;
            color: white;
        }

        /* Botão Verde Petrobras */
        .btn-entrar {
            width: 100%;
            background: linear-gradient(135deg, #15803d 0%, #166534 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(22, 101, 52, 0.3);
        }

        .btn-entrar:hover {
            background: linear-gradient(135deg, #166534 0%, #15803d 100%);
        }

        .btn-entrar:active {
            transform: scale(0.98);
        }

        .direitos-login {
            position: relative;
            z-index: 2;
            margin-top: 25px;
            font-size: 11px;
            color: #cbd5e1;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            max-width: 400px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h2>WMS Inteligente</h2>
            <p>Controle de Pátio & Inventário</p>
        </div>

        <form id="formLogin" onsubmit="efetuarAutenticacao(event)">
            <div class="campo-grupo">
                <label for="usuarioPerfil">Perfil de Acesso</label>
                <select id="usuarioPerfil" required>
                    <option value="" disabled selected>Selecione seu nível...</option>
                    <option value="OPERADOR">Colaborador Padrão (Pátio)</option>
                    <option value="ADMIN">Administrador Supremo</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label for="usuarioChave">Chave de Identificação</label>
                <input type="password" id="usuarioChave" placeholder="Digite sua senha ou registro..." required>
            </div>

            <button type="submit" class="btn-entrar">Acessar Painel</button>
        </form>
    </div>

    <div class="direitos-login">
        &copy; 2026 WMS Inteligente. Desenvolvido por <strong>Dário João Torres</strong>.<br>
        <span style="color: #fca5a5;">Acesso restrito a colaboradores autorizados Transpetro.</span>
    </div>

    <script>
        window.addEventListener('load', () => {
            localStorage.clear();
        });

        function efetuarAutenticacao(event) {
            event.preventDefault();

            const perfilSelecionado = document.getElementById('usuarioPerfil').value;
            const chaveInserida = document.getElementById('usuarioChave').value;

            if (!perfilSelecionado) {
                Swal.fire('Erro', 'Por favor, selecione um perfil de acesso.', 'error');
                return;
            }

            if (chaveInserida.trim().length < 3) {
                Swal.fire('Erro', 'Insira uma credencial válida.', 'error');
                return;
            }

            localStorage.setItem('wms_perfil', perfilSelecionado);
            window.location.replace("menu.html");
        }
    </script>
</body>
</html>
